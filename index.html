<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p id="parag1">This is my practical examination</p>
    <button id="btn1">Alert Me</button>
    <button id="btn2">Change Color</button>
</body>
<script>
const text = document.getElementById("parag1");
const btn = document.querySelector("#btn1");
const btnn = document.querySelector("#btn2");

btn.addEventListener("click", function(){
alert("Button 1 triggered");
});

btnn.addEventListener('click', function(){

    text.style.color = "red";

});
</script>
</html>
